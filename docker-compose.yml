version: "3.8"

services:
  lords-ai:
    image: ghcr.io/hugodower/lords-ai:latest
    ports:
      - "8100:8000"
    environment:
      - ORG_ID=${ORG_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CHATWOOT_URL=${CHATWOOT_URL}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
      - REDIS_URL=redis://lords-redis:6379
      - CHROMA_URL=http://lords-chromadb:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SANDBOX_MODE=${SANDBOX_MODE:-true}
      - SANDBOX_PHONES=${SANDBOX_PHONES:-+5518996597391}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_RESPONSE_TIME_SECONDS=${MAX_RESPONSE_TIME_SECONDS:-10}
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - lords-network

  lords-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lords-network

  lords-chromadb:
    image: chromadb/chroma:0.5.23
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    networks:
      - lords-network

volumes:
  redis_data:
  chroma_data:
networks:
  lords-network:
    driver: overlay
